# A2 - Triton Inference Server + vLLM backend, V1 (forced via env).
# Ablation cell for hosting_layer x engine_gen 2x2 factorial.
# n=1 paper finding: process RSS +20 KB/h.

cell_id: a2
short_label: triton_vllm_v1
description: |
  NVIDIA Triton Inference Server (25.09) with vLLM Python backend,
  V1 scheduler forced via VLLM_USE_V1=1.
  Triton 25.09 ships V0 as default; this env var flips it.

engine:
  image_repo: tritonserver
  image_tag: wosar2026_e2_a2
  digest_pin_file: engines/triton_vllm/image_pin.json

  container_name_template: "wosar2026_a2_r{replica}"

  command:
    - tritonserver
    - --model-repository=/models
    - --log-verbose=1

  env:
    HF_HOME: /root/.cache/huggingface
    VLLM_USE_V1: "1"

  shm_size: 8g
  gpu_device: 1
  # Host ports 8200-2 for slot gpu1 (a2 shares slot with e2; sequential within slot).
  port_mapping:
    - "8200:8000"
    - "8201:8001"
    - "8202:8002"
  volumes:
    - "{repo_root}/engines/triton_vllm/model_repository:/models"
    - "{hf_cache_host}:/root/.cache/huggingface"

  readyz:
    url: "http://localhost:8200/v2/health/ready"
    timeout_s: 900

  pid_strategy:
    type: triton_child
    process_pattern: "EngineCore|triton_python_backend_stub"

monitors:
  gpu_index_inherits_from_engine: true
  proc:
    label: triton_vllm_v1
    period_s: 5
  gpu:
    period_s: 1
  system:
    period_s: 5
  rotation_s: 60

workload:
  client_config_overrides:
    protocol: triton_vllm
    base_url: "http://localhost:8200"
    model: qwen
    # Recalibrated from n=1 (0.897 rps) to 1.753 rps after confirming that
    # vLLM V1 is actually initialized in Triton 25.09 with VLLM_USE_V1=1
    # (see smoke_test_run.sh B.engine.version check on a2). The n=1 rate
    # was derived from a pilot that may have run against V0 fallback;
    # 1.753 rps corresponds to 85% of empirical saturation throughput for
    # V1-in-Triton measured by scripts/calibrate_rate.sh on 2026-05-15.
    target_rate_rps: 1.753
    concurrency_cap: 64
    streaming_prob: 0.7
    request_distribution: poisson
    request_timeout_s: 600
    seed_template: "{replica}"

duration_s: 129600
warmup_discard_s: 3600
post_run_cooldown_s: 600
